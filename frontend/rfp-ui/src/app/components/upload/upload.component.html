<div class="space-y-4">
  <div>
    <h2 class="text-lg font-semibold">Upload RFP</h2>
    <p class="mt-1 text-sm text-slate-300">Choose a PDF file to start extracting requirements.</p>
  </div>

  <div class="upload-card p-4">
    <label class="block text-sm font-medium text-slate-300">RFP file</label>
    <div class="mt-2 flex flex-col gap-3 sm:flex-row sm:items-center">
      <input
        type="file"
        [disabled]="isUploading"
        class="upload-input block w-full cursor-pointer rounded-lg border text-slate-100 file:mr-4 file:rounded-md file:border-0 file:px-3 file:py-2 file:text-sky-950 hover:file:bg-sky-400 disabled:opacity-60"
        (change)="onFileSelected($event)"
      />
      <button
        class="upload-action inline-flex w-full items-center justify-center rounded-lg px-4 py-2 font-medium shadow-soft transition hover:brightness-105 active:scale-[0.99] sm:w-auto disabled:opacity-60"
        [disabled]="isUploading"
        (click)="uploadFile()"
      >
        <ng-container *ngIf="!isUploading; else uploadingTpl">Upload</ng-container>
        <ng-template #uploadingTpl>
          <span class="inline-flex items-center gap-2">
            <span class="h-4 w-4 animate-spin rounded-full border-2 border-slate-200 border-t-transparent"></span>
            Processing…
          </span>
        </ng-template>
      </button>
    </div>

    <p class="upload-hint mt-3 text-xs">Tip: uploads are processed server-side with RAG extraction.</p>

    <div *ngIf="successMessage" class="mt-3 rounded-lg border border-emerald-500/30 bg-emerald-500/10 p-3 text-sm text-emerald-200">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="mt-3 rounded-lg border border-rose-500/30 bg-rose-500/10 p-3 text-sm text-rose-200">
      {{ errorMessage }}
    </div>
  </div>


</div>
