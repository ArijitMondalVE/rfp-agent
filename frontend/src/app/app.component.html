<div class="h-screen bg-slate-950 text-slate-100 flex flex-col overflow-hidden">
  <!-- Header -->
  <header
    class="border-b border-white/10 bg-gradient-to-b from-sky-500/20 via-indigo-500/10 to-transparent flex-shrink-0"
  >
    <div class="flex items-center gap-3 sm:gap-4 px-4 sm:px-6 py-4 sm:py-6">
      <button
        (click)="toggleSidebar()"
        class="rounded-lg p-2 bg-slate-800 border border-white/10 hover:bg-slate-700 transition-colors flex-shrink-0"
        [attr.aria-label]="sidebarOpen ? 'Close sidebar' : 'Open sidebar'"
      >
        <svg
          *ngIf="!sidebarOpen"
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
        <svg
          *ngIf="sidebarOpen"
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>

      <div class="min-w-0 flex-1">
        <h1 class="text-lg sm:text-2xl font-semibold tracking-tight truncate">RFP Intelligence Agent</h1>
        <p class="mt-1 text-xs sm:text-sm text-slate-300 hidden sm:block">
          Upload RFP documents and chat with them using AI-powered RAG.
        </p>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <main class="flex flex-1 min-h-0 items-stretch relative">
    <!-- Mobile Backdrop -->
    <div
      *ngIf="sidebarOpen"
      class="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 md:hidden"
      (click)="toggleSidebar()"
    ></div>

    <!-- LEFT SIDEBAR -->
    <aside
      class="sidebar border-r border-white/10 bg-slate-900/40 flex flex-col transition-all duration-300 ease-in-out"
      [class.w-0]="!sidebarOpen"
      [class.min-w-0]="!sidebarOpen"
      [class.overflow-hidden]="!sidebarOpen"
      [class.sidebar-open]="sidebarOpen"
    >
      <div [class.hidden]="!sidebarOpen" [class.contents]="!sidebarOpen">
        <!-- Upload Section with Sandwich Bar Toggle -->
        <div class="sidebar-upload-section" [class.section-collapsed]="!uploadSectionOpen">
          <div class="upload-section-header" (click)="uploadSectionOpen = !uploadSectionOpen">
            <span class="upload-section-title">Upload RFP</span>
            <button class="sandwich-toggle" [attr.aria-label]="uploadSectionOpen ? 'Collapse upload section' : 'Expand upload section'">
              <svg class="sandwich-icon" [class.rotated]="!uploadSectionOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
          </div>
          <div class="upload-section-content" [class.content-collapsed]="!uploadSectionOpen">
            <app-upload (uploadComplete)="onDocumentUploaded($event)"></app-upload>
          </div>
        </div>

        <!-- Recent Documents -->
        <div class="sidebar-docs-section">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-slate-200">Recent Documents</h2>

            <div class="flex items-center gap-2">
              <span class="text-xs px-2 py-1 rounded-full bg-sky-500/20 text-sky-300"> PDFs </span>

              <button
                class="pdf-history-clear-btn"
                title="Clear PDF history"
                aria-label="Clear PDF history"
                (click)="clearRecentDocuments($event)"
                *ngIf="recentDocuments.length > 0"
              >
                Clear
              </button>

              <app-confirm-delete-modal
                *ngIf="showConfirmDeleteConfirm"
                [title]="'Clear PDF history?'"
                [targetLabel]="confirmDeleteTargetLabel"
                [description]="''"
                [confirmText]="'Clear'"
                [variant]="'danger'"
                (confirm)="confirmClearPdfHistory()"
                (close)="closeConfirmDeleteModal()"
              ></app-confirm-delete-modal>
            </div>
          </div>

          <!-- PDF Delete Confirmation Modal (same pattern as chat history delete) -->
          <app-pdf-delete-modal
            *ngIf="showPdfDeleteConfirm"
            [filename]="pdfToDelete || ''"
            (confirm)="confirmPdfDelete()"
            (close)="closePdfDeleteModal()"
          ></app-pdf-delete-modal>

          <div class="space-y-2">
            <div
              *ngIf="recentDocuments.length === 0"
              class="rounded-xl border border-white/10 bg-slate-800/30 p-3"
            >
              <div class="font-medium text-sm text-slate-100">No recent uploads</div>

              <div class="mt-1 text-xs text-slate-400">Upload a PDF to see it here.</div>
            </div>

            <div
              *ngFor="let doc of recentDocuments"
              (click)="openDocument(doc)"
              class="group rounded-xl border border-white/10 bg-slate-800/50 p-3 hover:bg-slate-800 transition cursor-pointer relative"
            >
              <button
                class="pdf-history-delete-btn"
                title="Delete PDF from history"
                aria-label="Delete PDF from history"
                (click)="deleteRecentDocument(doc, $event)"
              >
                ×
              </button>

              <div class="font-medium text-xs text-slate-100 truncate pr-5">
                {{ doc.filename }}
              </div>

              <div class="mt-1 text-xs text-slate-400">
                {{ formatUploadedAt(doc.uploadedAt) }}
              </div>
            </div>
          </div>
        </div>

        <!-- Chat History -->
        <div class="sidebar-chat-section flex-1 min-h-0">
          <app-chat-window
            #chatWindow
            (activeChatChanged)="onActiveChatChanged($event)"
            (allChatsCleared)="onAllChatsCleared()"
          ></app-chat-window>
        </div>
      </div>
    </aside>

    <!-- RIGHT PANEL -->
    <section class="main-content flex flex-row bg-slate-950 flex-1 min-h-0">

      <!-- REPORT AREA (center, main) -->
      <div class="report-area flex-1 min-w-0 flex flex-col">
        <div class="report-wrapper flex-1 min-h-0 overflow-hidden flex flex-col">
          <div class="report-section-inner-wrapper flex-1 min-h-0 p-6 overflow-y-auto">
            <div class="max-w-4xl w-full mx-auto">
              <app-report #reportComp (toggleSidebar)="toggleReportSidebar()"></app-report>
            </div>
          </div>
        </div>
      </div>

      <div
        *ngIf="reportSidebarOpen"
        class="fixed inset-0 bg-black/50 z-50 md:hidden"
        (click)="closeReportSidebar()"
      ></div>

      <!-- CHAT SIDEBAR (right, narrow) -->

      <div class="report-resizer" (mousedown)="startReportResize($event)"></div>

      <aside
        class="report-sidebar border-l border-white/10 bg-slate-900/40"
        [class.animate]="!isReportResizing"
        [class.mobile-open]="reportSidebarOpen"
        [class.collapsed]="reportSidebarCollapsed"
        [style.width.px]="reportSidebarCollapsed ? 0 : reportSidebarWidth"
      >
        <div class="h-full overflow-hidden flex flex-col">
          <div class="report-toolbar px-4 pt-4">
            <button
              class="report-toggle-btn"
              (click)="toggleReportCollapsedFromButton()"
            >
              ☰
            </button>
          </div>
          <div class="flex-1 min-h-0 overflow-hidden flex flex-col px-4 pb-4">
            <app-chat
              #chatComp
              class="flex-1 w-full"
              [sessionId]="activeSessionId"
              (messageStreamComplete)="onMessageStreamComplete()"
            >
            </app-chat>
          </div>
        </div>
      </aside>
      <button
        *ngIf="!reportSidebarOpen"
        class="report-reopen-btn"
        (click)="openReportSidebar()"
      >
        💬
      </button>
    </section>
  </main>
</div>
